<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Classification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            margin: 20px 0;
            transition: all 0.3s ease;
        }
        .upload-area:hover {
            border-color: #007bff;
            background-color: #f8f9fa;
        }
        .preview-image {
            max-width: 100%;
            max-height: 300px;
            margin: 20px 0;
        }
        .loading {
            display: none;
        }
        .result-card {
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <h1 class="text-center mb-4">Image Classification</h1>
        
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <div class="upload-area" id="dropZone">
                            <p class="mb-0">Drag and drop an image here or click to select</p>
                            <input type="file" id="fileInput" accept="image/*" class="d-none">
                        </div>
                        
                        <div class="text-center">
                            <img id="preview" class="preview-image d-none">
                            
                            <div class="loading" id="loading">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                                <p>Processing image...</p>
                            </div>
                        </div>
                        
                        <div class="result-card" id="result">
                            <div class="alert alert-success">
                                <h5 class="alert-heading">Disease Detection Results:</h5>
                                <div class="mt-3">
                                    <h6>Disease Name:</h6>
                                    <p id="diseaseName"></p>
                                    
                                    <h6>Description:</h6>
                                    <p id="diseaseDescription"></p>
                                    
                                    <h6>Prevention Steps:</h6>
                                    <p id="preventionSteps"></p>
                                    
                                    <h6>Recommended Supplement:</h6>
                                    <p id="supplementInfo"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            const dropZone = $('#dropZone');
            const fileInput = $('#fileInput');
            const preview = $('#preview');
            const loading = $('#loading');
            const result = $('#result');
            const predictionText = $('#predictionText');

            dropZone.on('click', () => fileInput.click());

            dropZone.on('dragover', (e) => {
                e.preventDefault();
                dropZone.css('border-color', '#007bff');
            });

            dropZone.on('dragleave', () => {
                dropZone.css('border-color', '#ccc');
            });

            dropZone.on('drop', (e) => {
                e.preventDefault();
                const files = e.originalEvent.dataTransfer.files;
                handleFile(files[0]);
            });

            fileInput.on('change', (e) => {
                handleFile(e.target.files[0]);
            });

            function handleFile(file) {
                if (!file || !file.type.startsWith('image/')) {
                    alert('Please upload an image file');
                    return;
                }

                // Show preview
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.attr('src', e.target.result)
                           .removeClass('d-none');
                }
                reader.readAsDataURL(file);

                // Upload and get prediction
                const formData = new FormData();
                formData.append('file', file);

                loading.show();
                result.hide();

                $.ajax({
                    url: '/predict',
                    type: 'POST',
                    data: formData,
                    processData: false,
                    contentType: false,
                    success: function(response) {
                        $('#diseaseName').text(response.disease_name);
                        $('#diseaseDescription').text(response.description);
                        $('#preventionSteps').text(response.prevention);
                        $('#supplementInfo').text(response.supplement);
                        result.show();
                    },
                    error: function() {
                        alert('Error processing image');
                    },
                    complete: function() {
                        loading.hide();
                    }
                });
            }
        });
    </script>
</body>
</html>
